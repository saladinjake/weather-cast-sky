openapi: 3.0.0
info:
  title: SkyCast API
  description: API documentation for the SkyCast Weather Application
  version: 1.0.0
servers:
  - url: http://localhost:5000/api
    description: Local development server
paths:
  /health:
    get:
      summary: API health check
      responses:
        '200':
          description: API is healthy
  /weather/{city}:
    get:
      summary: Get weather for a specific city
      parameters:
        - name: city
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Weather and forecast data
